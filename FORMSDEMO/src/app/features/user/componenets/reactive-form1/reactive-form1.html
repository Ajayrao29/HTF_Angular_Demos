<form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="max-w-md mx-auto mt-10 p-8 bg-white rounded-xl shadow-lg border border-gray-200 space-y-6">

  <!-- First Name Field -->
  <div>
    <label for="first-name" class="block text-gray-800 text-sm font-bold mb-2">
      First Name:
    </label>
    <input
      id="first-name"
      type="text"
      formControlName="firstName"
      [ngClass]="{
        'border-red-500 focus:border-red-500 focus:ring-red-500': profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched,
        'border-gray-300 focus:border-blue-500 focus:ring-blue-500': profileForm.get('firstName')?.valid || profileForm.get('firstName')?.untouched
      }"
      class="w-full px-3 py-2 bg-gray-50 border rounded-lg focus:outline-none focus:ring-2 transition-colors duration-200 shadow-sm"
    >
    <!-- Error Message -->
    <div class="mt-2">
      @if (profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched) {
        <small class="text-red-500 text-xs font-medium">
          First name is required.
        </small>
      }
    </div>
  </div>

  <!-- Email Field -->
  <div>
    <label for="email" class="block text-gray-800 text-sm font-bold mb-2">
      Email:
    </label>
    <input
      id="email"
      type="email"
      formControlName="email"
      [ngClass]="{
        'border-red-500 focus:border-red-500 focus:ring-red-500': profileForm.get('email')?.invalid && profileForm.get('email')?.touched,
        'border-gray-300 focus:border-blue-500 focus:ring-blue-500': profileForm.get('email')?.valid || profileForm.get('email')?.untouched
      }"
      class="w-full px-3 py-2 bg-gray-50 border rounded-lg focus:outline-none focus:ring-2 transition-colors duration-200 shadow-sm"
    >
    <!-- Error Message -->
    <div class="mt-2">
      @if (profileForm.get('email')?.invalid && profileForm.get('email')?.touched) {
        <small class="text-red-500 text-xs font-medium">
          Please enter a valid email.
        </small>
      }
    </div>
  </div>

  <!-- Submit Button -->
  <button
    type="submit"
    [disabled]="!profileForm.valid"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-gray-400 disabled:shadow-none"
  >
    Submit
  </button>
</form>
