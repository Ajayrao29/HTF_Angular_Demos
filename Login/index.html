<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: sans-serif;
      background: #f4f4f4;
    }

    .login-box {
      width: 320px;
      padding: 20px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 22px;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: 0;
      border-radius: 4px;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <form class="login-box">
    <h1>Login</h1>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Enter email" required />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" required />

    <button type="submit">Sign In</button>
  </form>
</body>
</html>
