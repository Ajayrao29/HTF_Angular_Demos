<article class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:shadow-md">
	<div class="space-y-2.5 text-base text-slate-700">
		<p><span class="font-semibold text-slate-900">ID:</span> {{ person.id }}</p>
		<p><span class="font-semibold text-slate-900">Name:</span> {{ person.fname }} {{ person.lname }}</p>
		<p><span class="font-semibold text-slate-900">Age:</span> {{ person.age }}</p>
	</div>

	<button
		type="button"
		class="mt-5 rounded-md bg-red-600 px-4 py-2.5 text-base font-medium text-white transition hover:bg-red-700"
		(click)="removePerson()"
	>
		Remove
	</button>
</article>
