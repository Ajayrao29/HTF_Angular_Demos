<section class="mb-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h3 class="mb-4 text-xl font-semibold text-slate-800">Add Person</h3>

  <div class="grid gap-3 sm:grid-cols-4">
    <input
      type="text"
      name="firstName"
      [(ngModel)]="firstName"
      placeholder="First name"
      class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 outline-none ring-slate-300 focus:ring-2"
      required
    />

    <input
      type="text"
      name="lastName"
      [(ngModel)]="lastName"
      placeholder="Last name"
      class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 outline-none ring-slate-300 focus:ring-2"
      required
    />

    <input
      type="number"
      name="age"
      [(ngModel)]="age"
      min="1"
      placeholder="Age"
      class="rounded-md border border-slate-300 px-3 py-2 text-slate-800 outline-none ring-slate-300 focus:ring-2"
      required
    />

    <button
      type="button"
      class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700"
      (click)="addPerson()"
    >
      Add
    </button>
  </div>
</section>
